# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Copy plugin JAR
        run: |
          cp i18n-editor-plugin/lib/i18n-editor-plugin-${{ steps.version.outputs.VERSION }}.jar \
             build/distributions/i18n-editor-plugin-${{ steps.version.outputs.VERSION }}.jar

      - name: Zip KotlinProject
        run: |
          zip -r build/distributions/KotlinProject-${{ steps.version.outputs.VERSION }}.zip KotlinProject/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "i18n Strings Editor ${{ github.ref_name }}"
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what changed in this release.

            ### Installation
            Download the `.jar` below and install it via **Settings → Plugins → ⚙ → Install Plugin from Disk**.

            ### Test Project
            Download `KotlinProject` to try the plugin on a ready-made Lyricist setup without touching your own project.
          files: |
            build/distributions/i18n-editor-plugin-${{ steps.version.outputs.VERSION }}.jar
            build/distributions/KotlinProject-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}